name: AI code review (on /review comment)

# Comment "/review" on a pull request to run an AI review and post the results.
# Note: comment triggers only fire when this workflow is on the default branch.
on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Only run on pull requests (not plain issues) and only for a "/review" comment.
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/review') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AI review
        uses: ./
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          pr-number: ${{ github.event.issue.number }}
