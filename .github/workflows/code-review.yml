name: AI code review (manual)

# Manual only: trigger from the Actions tab ("Run workflow"), enter a PR number.
# Dogfoods our own composite action (uses: ./), which runs the published reviewer-lib
# CLI and posts inline comments + a summary back to that pull request.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review and comment on'
        required: true
      fail_on:
        description: 'Fail the job at this severity or above (leave empty to never fail)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AI review
        uses: ./
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          pr-number: ${{ inputs.pr_number }}
          fail-on: ${{ inputs.fail_on }}
          model: o4-mini # reasoning model — far fewer defensive false positives (eval: noise 0/4)
          # This repo's noise: eval cases (intentional bugs), docs, workflow/config, images.
          exclude: 'evals/**,*.md,.github/**,tsconfig.json,*.png'
